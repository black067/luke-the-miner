name: Deploy to GitHub Pages

on:
  push:
    branches:
      - release

  # 允许手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以便部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署运行
concurrency:
  group: pages
  cancel-in-progress: false

# 强制 GitHub Actions 使用 Node.js 24 运行 JavaScript 操作
# 避免 Node.js 20 弃用警告（2026-09-16 后移除）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Prepare publish directory
        run: |
          mkdir _site
          cp index.html _site/
          cp -r css _site/
          cp -r dist _site/
          cp -r assets _site/
          echo "=== _site contents ==="
          find _site -type f | sort

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Deployment job
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
